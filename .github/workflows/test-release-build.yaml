name: "TEMPORARY: Test Release Build on macOS"

on:
  pull_request:
    branches:
      - '*'

jobs:
  test-macos-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Assemble all targets
        run: ./gradlew assemble --no-daemon --stacktrace
